version: '3.8'

services:
  # MongoDB - Primary Database
  mongodb:
    image: mongo:latest
    container_name: fcs26-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-professional_network}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - internal-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  # Redis - Cache, Sessions, Pub/Sub
  redis:
    image: redis:latest
    container_name: fcs26-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_pass} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: fcs26-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-changeme123}@mongodb:27017/${MONGO_DATABASE:-professional_network}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_pass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    volumes:
      - backend_uploads:/app/uploads
      - ./backend/src:/app/src
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    networks:
      - internal-network
      - frontend-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: fcs26-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_URL: ""
      VITE_WS_URL: ""
      VITE_BACKEND_URL: "http://backend:5000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - frontend-network
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true


  # Nginx - Reverse Proxy (HTTPS termination, DDoS protection, Clickjacking headers)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: fcs26-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_ssl:/etc/nginx/ssl
    networks:
      - frontend-network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true

networks:
  internal-network:
    driver: bridge
    internal: true
  frontend-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:
  backend_uploads:
  nginx_ssl:
