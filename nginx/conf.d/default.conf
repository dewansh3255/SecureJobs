# ─────────────────────────────────────────────────────────────
# Nginx Reverse Proxy — FCS-26 Professional Network
# Handles: HTTPS termination, HSTS, Clickjacking, DDoS basics
# ─────────────────────────────────────────────────────────────

# Rate limiting zones (DOS/API flood protection)
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow CA cert download over plain HTTP so devices can trust HTTPS first
    location = /mkcert-ca.crt {
        alias /etc/nginx/ssl/mkcert-ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="NexusCA.crt"';
        expires -1;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name localhost;

    # ── TLS (self-signed for dev; swap for Let's Encrypt in prod) ──
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_stapling        off; # enable in prod with real cert

    # ── Security headers (defence-in-depth on top of Helmet) ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                    always;  # Clickjacking
    add_header X-Content-Type-Options    nosniff                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' wss: ws:; frame-ancestors 'none';" always;

    # ── Connection limits (prevent connection exhaustion) ──────
    limit_conn conn_limit 20;

    # ── Client body size limit ─────────────────────────────────
    client_max_body_size 10m;

    # ── Timeouts ───────────────────────────────────────────────
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          10s;
    keepalive_timeout     65s;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── API routes → backend ──────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Auth endpoints — stricter limits ──────────────────────
    location ~ ^/api/auth/(login|register|forgot-password) {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── File uploads — stricter limits ─────────────────────────
    location ~ ^/api/users/me/(photo|cover) {
        limit_req zone=upload_limit burst=5 nodelay;
        client_max_body_size 10m;

        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Static uploads ────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://backend:5000;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # ── CA cert download (so classmates can trust the HTTPS cert) ────
    # Visit https://10.118.104.23/mkcert-ca.crt on any device to download + install
    location = /mkcert-ca.crt {
        alias /etc/nginx/ssl/mkcert-ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="NexusCA.crt"';
        expires -1;
    }

    # ── WebSocket (Socket.IO) ─────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Frontend (React SPA) ──────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Block common attack paths ─────────────────────────────
    location ~* (\.php|\.asp|\.aspx|\.jsp|/wp-admin|/phpmyadmin|/admin\.php) {
        return 444;
    }
}
